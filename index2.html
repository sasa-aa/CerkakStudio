<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cerkak Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- ================= BERANDA ================= -->

<div id="homePage" class="card">

<div class="logo">📖</div>

<h1>Cerkak Studio</h1>

<p class="subtitle">

Media Pembelajaran Menulis Cerkak Basa Jawa

</p>

<div class="quote">

"Saben crita diwiwiti saka sawijining gagasan."

</div>

<button id="startButton">

Mulai Menulis →

</button>

</div>

<!-- ================= WIZARD ================= -->

<div id="wizardPage" class="card hidden">

<div class="progress">

<div class="progress-bar" id="progressBar"></div>

</div>

<h2>Langkah 1 dari 7</h2>

<h3>Identitas Siswa</h3>

<div class="form-group">

<label>Nama</label>

<input type="text" id="nama">

</div>

<div class="form-group">

<label>Kelas</label>

<input type="text" id="kelas">

</div>

<div class="form-group">

<label>Nomor Absen</label>

<input type="number" id="absen">

</div>

<div class="button-group">

<button id="nextButton">

Berikutnya →

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>

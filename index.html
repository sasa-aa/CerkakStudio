index.html (template)

<!DOCTYPE html>
Cerkak Studio
    <div class="logo">📖</div>
    <h1>Cerkak Studio</h1>
    <p class="subtitle">Media Pembelajaran Menulis Cerkak Basa Jawa</p>
    <div class="quote">"Saben crita diwiwiti saka sawijining gagasan."</div>
    <button onclick="mulai()">Mulai Menulis</button>

    <div class="progress"><div id="bar" class="progress-bar"></div></div>
    <h2 id="judul">Langkah 1 dari 7</h2>

    <div class="step active">
      <label>Nama</label><input id="nama">
      <label>Kelas</label><input id="kelas">
      <label>Absen</label><input id="absen" type="number">
    </div>

    <div class="step">
      <label>Tema</label>
      <select id="tema">
        <option>Persahabatan</option>
        <option>Keluarga</option>
        <option>Sekolah</option>
        <option>Budaya Jawa</option>
        <option>Lingkungan</option>
        <option>Bebas</option>
      </select>
    </div>

    <div class="step">
      <label>Tokoh</label><input id="tokoh">
      <label>Watak</label><input id="watak">
    </div>

    <div class="step">
      <label>Tempat</label><input id="tempat">
      <label>Waktu</label><input id="waktu">
      <label>Suasana</label><input id="suasana">
    </div>

    <div class="step">
      <label>Awal</label><textarea id="awal"></textarea>
      <label>Konflik</label><textarea id="konflik"></textarea>
      <label>Akhir</label><textarea id="akhir"></textarea>
    </div>

    <div class="step">
      <label>Amanat</label><textarea id="amanat"></textarea>
    </div>

    <div class="step">
      <label>Judul</label><input id="judulCerita">
      <label>Cerita</label><textarea id="cerita" rows="10"></textarea>
      <button onclick="kirimData()">📤 Kirim Cerkak</button>
    </div>

    <div class="nav">
      <button onclick="prevStep()">← Sebelumnya</button>
      <button onclick="nextStep()">Berikutnya →</button>
    </div>

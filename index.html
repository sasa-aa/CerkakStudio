    </div>

    <button onclick="mulai()">
      Mulai Menulis
    </button>

    <div class="progress">
      <div id="bar" class="progress-bar"></div>
    </div>

    <h2 id="judul">Langkah 1 dari 7</h2>

    <!-- STEP 1 -->
    <div class="step active">
      <h3>Identitas</h3>

      <label>Nama</label>
      <input id="nama" type="text">

      <label>Kelas</label>
      <input id="kelas" type="text">

      <label>Nomor Absen</label>
      <input id="absen" type="number">
    </div>

    <!-- STEP 2 -->
    <div class="step">
      <h3>Tema Cerita</h3>

      <label>Tema</label>

      <select id="tema">
        <option value="">Pilih Tema</option>
        <option>Persahabatan</option>
        <option>Keluarga</option>
        <option>Sekolah</option>
        <option>Budaya Jawa</option>
        <option>Lingkungan</option>
        <option>Bebas</option>
      </select>
    </div>

    <!-- STEP 3 -->
    <div class="step">
      <h3>Tokoh</h3>

      <label>Tokoh Utama</label>
      <input id="tokoh">

      <label>Watak</label>
      <input id="watak">
    </div>

    <!-- STEP 4 -->
    <div class="step">
      <h3>Latar</h3>

      <label>Tempat</label>
      <input id="tempat">

      <label>Waktu</label>
      <input id="waktu">

      <label>Suasana</label>
      <input id="suasana">
    </div>

    <!-- STEP 5 -->
    <div class="step">

      <h3>Alur</h3>

      <label>Awal Cerita</label>
      <textarea id="awal"></textarea>

      <label>Konflik</label>
      <textarea id="konflik"></textarea>

      <label>Penyelesaian</label>
      <textarea id="akhir"></textarea>

    </div>

    <!-- STEP 6 -->
    <div class="step">

      <h3>Amanat</h3>

      <textarea id="amanat"></textarea>

    </div>

    <!-- STEP 7 -->

    <div class="step">

      <h3>Menulis Cerkak</h3>

      <label>Judul</label>

      <input id="judulCerita">

      <label>Isi Cerkak</label>

      <textarea id="cerita" rows="12"></textarea>

      <button onclick="kirimData()">
        📤 Kirim Cerkak
      </button>

    </div>

    <div class="nav">

      <button onclick="prevStep()">
        ← Sebelumnya
      </button>

      <button onclick="nextStep()">
        Berikutnya →
      </button>

    </div>

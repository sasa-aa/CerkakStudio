<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Cerkak Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<!-- ================= BERANDA ================= -->

<div id="home" class="card">

<div class="logo">📖</div>

<h1>Cerkak Studio</h1>

<p class="subtitle">

Media Pembelajaran Menulis Cerkak Basa Jawa

</p>

<div class="quote">

"Saben crita diwiwiti saka sawijining gagasan."

</div>

<button onclick="mulai()">

Mulai Menulis

</button>

</div>

<!-- ================= WIZARD ================= -->

<div id="wizard" class="card hidden">

<div class="progress">

<div id="bar" class="progress-bar"></div>

</div>

<h2 id="judul">

Langkah 1 dari 7

</h2>

<!-- STEP 1 -->

<div class="step active">

<label>Nama</label>

<input type="text">

<label>Kelas</label>

<input type="text">

<label>Absen</label>

<input type="number">

</div>

<!-- STEP 2 -->

<div class="step">

<label>Tema Cerita</label>

<select>

<option>Persahabatan</option>

<option>Keluarga</option>

<option>Sekolah</option>

<option>Budaya Jawa</option>

<option>Lingkungan</option>

<option>Bebas</option>

</select>

</div>

<!-- STEP 3 -->

<div class="step">

<h3>Tokoh dan Watak</h3>

<p>(Akan kita lengkapi pada bagian berikutnya)</p>

</div>

<!-- STEP 4 -->

<div class="step">

<h3>Latar</h3>

</div>

<!-- STEP 5 -->

<div class="step">

<h3>Alur</h3>

</div>

<!-- STEP 6 -->

<div class="step">

<h3>Amanat</h3>

</div>

<!-- STEP 7 -->

<div class="step">

<h3>Menulis Cerkak</h3>

<textarea rows="8"></textarea>

</div>

<div class="nav">

<button onclick="prevStep()">

← Sebelumnya

</button>

<button onclick="nextStep()">

Berikutnya →

</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
